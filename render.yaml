services:
  # PostgreSQL Database
  - type: pserv
    name: portfolio-db
    env: docker
    plan: free
    region: oregon

  # Backend API
  - type: web
    name: portfolio-backend
    env: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: ADMIN_EMAIL
        value: myportfolio@gmail.com
      - key: ADMIN_PASSWORD
        value: "@Ab7340diand"

  # Frontend Portfolio
  - type: web
    name: portfolio-frontend
    env: static
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://portfolio-backend.onrender.com/api

  # Admin Panel
  - type: web
    name: portfolio-admin
    env: static
    region: oregon
    plan: free
    buildCommand: cd admin && npm install && npm run build
    staticPublishPath: ./admin/dist

databases:
  - name: portfolio-db
    plan: free
    databaseName: portfolio_db
    user: portfolio_user
