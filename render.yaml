databases:
  - name: portfolio-db
    databaseName: portfolio_db
    user: portfolio_user

services:
  # Backend API
  - type: web
    name: portfolio-backend
    env: node
    region: oregon
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: ADMIN_EMAIL
        value: admin@myportfolio.com
      - key: ADMIN_PASSWORD
        generateValue: true

  # Frontend Portfolio
  - type: web
    name: portfolio-frontend
    env: static
    region: oregon
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false

  # Admin Panel
  - type: web
    name: portfolio-admin
    env: static
    region: oregon
    buildCommand: cd admin && npm install && npm run build
    staticPublishPath: ./admin/dist
    envVars:
      - key: VITE_API_URL
        sync: false
